services:
  db:
    image: postgres:15-alpine
    container_name: nutrisnap_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nutrisnap
      POSTGRES_PASSWORD: nutrisnap_pass
      POSTGRES_DB: nutrisnap
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - proxy
    security_opt:
      - apparmor:unconfined

  nutrisnap:
    build: .
    user: "root"
    container_name: nutrisnap_prod
    volumes:
      - /opt/docker/containers/vision-health-app/temp:/app/public/uploads
    ports:
      - "3001:3000"
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://nutrisnap:nutrisnap_pass@db:5432/nutrisnap}
      - PYTHON_API_URL=${PYTHON_API_URL:-http://host.docker.internal:5000/health-matrix}
      - NODE_ENV=${NODE_ENV:-production}
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD:-ProductionPassword123!}
      - ADMIN_RECOVERY_KEY=${ADMIN_RECOVERY_KEY:-RecoveryKey@2024Secure!}
      - USE_MOCK_HEALTH_API=${USE_MOCK_HEALTH_API:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      # MAIN SITE
      - "traefik.http.routers.nutrisnap.rule=Host(`nutrisnap.mkcyberlabs.in`) || Host(`nutrisnap.laxmimanickam.in`)"
      - "traefik.http.routers.nutrisnap.entrypoints=websecure"
      - "traefik.http.routers.nutrisnap.tls.certresolver=letsencrypt"
      # Since Next.js exposes port 9002 inside the Dockerfile
      - "traefik.http.services.nutrisnap.loadbalancer.server.port=3000"
    networks:
      - proxy
    security_opt:
      - apparmor:unconfined

volumes:
  pgdata:

networks:
  proxy:
    external: true
