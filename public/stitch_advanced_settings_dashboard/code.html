<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Settings Loading State</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#930022',
            'brand-light': '#a81635',
            'gray-bg': '#d8d8d8',
            'panel-bg': '#ffffff',
            'input-bg': '#e5e7eb',
            'input-border': '#d1d5db',
            'text-dark': '#1f2937',
            'text-muted': '#4b5563',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
<style data-purpose="custom-styles">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      background-color: #d8d8d8; /* Match the gray background of the image */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    /* Custom scrollbar for webkit */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="antialiased text-gray-800">
<!-- BEGIN: MainModalContainer -->
<main class="relative w-full max-w-5xl mx-auto p-4 sm:p-8 flex justify-center items-center h-screen">
<!-- Modal Card -->
<div class="bg-white rounded-xl shadow-2xl overflow-hidden w-full max-w-4xl flex flex-col h-[600px]" data-purpose="settings-modal">
<!-- BEGIN: ModalHeader -->
<header class="bg-brand text-white px-6 py-4 flex justify-between items-center" data-purpose="modal-header">
<h2 class="text-xl font-semibold">Settings</h2>
<button aria-label="Close settings" class="text-white hover:text-gray-200 transition-colors focus:outline-none">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</header>
<!-- END: ModalHeader -->
<!-- BEGIN: ModalBody -->
<div class="flex flex-1 overflow-hidden" data-purpose="modal-body">
<!-- BEGIN: Sidebar -->
<aside class="w-64 border-r border-gray-100 bg-white py-6 flex flex-col gap-2 overflow-y-auto" data-purpose="sidebar-navigation">
<a class="flex items-center gap-3 px-6 py-3 text-gray-700 hover:bg-gray-50 transition-colors group" href="#">
<svg class="h-5 w-5 text-brand" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="font-medium text-sm">Account &amp; Security</span>
</a>
<a aria-current="page" class="flex items-center gap-3 px-6 py-3 bg-brand text-white transition-colors shadow-sm mx-4 rounded-lg relative overflow-hidden" href="#">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="font-medium text-sm">Health &amp; Biometrics</span>
</a>
<a class="flex items-center gap-3 px-6 py-3 text-gray-700 hover:bg-gray-50 transition-colors group" href="#">
<svg class="h-5 w-5 text-brand" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="font-medium text-sm">Notifications</span>
</a>
<a class="flex items-center gap-3 px-6 py-3 text-gray-700 hover:bg-gray-50 transition-colors group" href="#">
<svg class="h-5 w-5 text-brand" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="font-medium text-sm">Preferences</span>
</a>
</aside>
<!-- END: Sidebar -->
<!-- BEGIN: MainContentArea -->
<section class="flex-1 p-8 overflow-y-auto bg-gray-50/50 relative" data-purpose="settings-content">
<!-- Content Card -->
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 h-full flex flex-col relative" data-purpose="health-biometrics-form">
<h3 class="text-2xl font-bold text-gray-900 mb-6">Health &amp; Biometrics</h3>
<!-- Biometrics Section -->
<div class="mb-8" data-purpose="biometrics-section">
<h4 class="text-lg font-semibold text-gray-800 mb-4">Biometrics</h4>
<div class="grid grid-cols-1 md:grid-cols-4 gap-4">
<div>
<label class="block text-sm font-medium text-gray-700 mb-1" for="age">Age</label>
<input class="w-full rounded-md border-gray-300 bg-gray-100 text-gray-500 shadow-sm focus:border-brand focus:ring-brand sm:text-sm cursor-not-allowed px-3 py-2 border" disabled="" id="age" type="text" value="28"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1" for="weight">Weight (kg)</label>
<input class="w-full rounded-md border-gray-300 bg-gray-100 text-gray-500 shadow-sm focus:border-brand focus:ring-brand sm:text-sm cursor-not-allowed px-3 py-2 border" disabled="" id="weight" type="text" value="80"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1" for="height">Height (cm)</label>
<input class="w-full rounded-md border-gray-300 bg-gray-100 text-gray-500 shadow-sm focus:border-brand focus:ring-brand sm:text-sm cursor-not-allowed px-3 py-2 border" disabled="" id="height" type="text" value="175"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1" for="gender">Gender</label>
<select class="w-full rounded-md border-gray-300 bg-gray-100 text-gray-500 shadow-sm focus:border-brand focus:ring-brand sm:text-sm cursor-not-allowed px-3 py-2 border appearance-none" disabled="" id="gender">
<option selected="">Male</option>
</select>
</div>
</div>
</div>
<!-- Divider/Heading for Nutrition Goals -->
<div class="w-full bg-brand text-white py-2 px-4 rounded-md mb-6 text-center font-medium shadow-sm" data-purpose="section-divider">
              Nutrition Goals
            </div>
<!-- Nutrition Goals Section -->
<div class="mb-8 flex-1" data-purpose="nutrition-goals-section">
<h4 class="text-lg font-semibold text-gray-800 mb-4">Daily Nutrition Goals</h4>
<div class="grid grid-cols-1 md:grid-cols-4 gap-4">
<div>
<label class="block text-sm font-medium text-gray-700 mb-1" for="calories">Calories (kcal)</label>
<input class="w-full rounded-md border-gray-300 bg-gray-100 text-gray-500 shadow-sm focus:border-brand focus:ring-brand sm:text-sm cursor-not-allowed px-3 py-2 border" disabled="" id="calories" type="text" value="1000"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1" for="protein">Protein (g)</label>
<input class="w-full rounded-md border-gray-300 bg-gray-100 text-gray-500 shadow-sm focus:border-brand focus:ring-brand sm:text-sm cursor-not-allowed px-3 py-2 border" disabled="" id="protein" type="text" value="150"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1" for="carbs">Carbs (g)</label>
<input class="w-full rounded-md border-gray-300 bg-gray-100 text-gray-500 shadow-sm focus:border-brand focus:ring-brand sm:text-sm cursor-not-allowed px-3 py-2 border" disabled="" id="carbs" type="text" value="300"/>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1" for="fat">Fat (g)</label>
<input class="w-full rounded-md border-gray-300 bg-gray-100 text-gray-500 shadow-sm focus:border-brand focus:ring-brand sm:text-sm cursor-not-allowed px-3 py-2 border" disabled="" id="fat" type="text" value="35"/>
</div>
</div>
</div>
<!-- Save Button Area (Loading State) -->
<div class="mt-auto pt-4" data-purpose="form-actions">
<button class="w-full flex items-center justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-gray-400 cursor-not-allowed transition-colors" disabled="" type="button">
<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
<path class="opacity-75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" fill="currentColor"></path>
</svg>
                Saving...
              </button>
</div>
</div>
</section>
<!-- END: MainContentArea -->
</div>
<!-- END: ModalBody -->
</div>
</main>
<!-- END: MainModalContainer -->
<!-- BEGIN: ToastNotification -->
<div class="fixed bottom-8 right-8 z-50 animate-fade-in-up" data-purpose="toast-notification">
<div class="bg-brand text-white px-6 py-3 rounded-full shadow-lg flex items-center gap-3 text-sm font-medium">
      Saving your data...
    </div>
</div>
<!-- END: ToastNotification -->
<style>
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.3s ease-out forwards;
    }
  </style>
</body></html>
